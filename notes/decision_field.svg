<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  <rect width="800" height="600" fill="white"/>
  
  <!-- Grid -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="80" y1="100" x2="80" y2="500"/>
    <line x1="80" y1="500" x2="680" y2="500"/>
  </g>
  
  <!-- Axes -->
  <line x1="80" y1="500" x2="700" y2="500" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="80" y1="500" x2="80" y2="80" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="525" fill="#334155" font-size="14" font-weight="500">z_divergence →</text>
  <text x="35" y="90" fill="#334155" font-size="14" font-weight="500" transform="rotate(-90 35 90)">↑ z_entropy</text>
  
  <!-- Diagonal (balance line) -->
  <line x1="120" y1="460" x2="640" y2="140" stroke="#64748b" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="650" y="135" fill="#64748b" font-size="12" font-style="italic">z_entropy ≈ z_divergence</text>
  
  <!-- Soft ridge band -->
  <polygon points="100,480 140,440 620,120 660,160" fill="#2563eb" opacity="0.15"/>
  <polygon points="100,480 140,440 620,120 660,160" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
  
  <!-- Competitive regime label -->
  <rect x="300" y="260" width="200" height="70" fill="white" stroke="#2563eb" stroke-width="1.5" rx="6"/>
  <text x="400" y="282" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="600">Competitive Regime (Q1)</text>
  <text x="400" y="302" text-anchor="middle" fill="#2563eb" font-size="11">soft ridge • high curvature</text>
  <text x="400" y="320" text-anchor="middle" fill="#475569" font-size="11">flip_rate 51% • m_var dominant</text>
  
  <!-- Determined regimes -->
  <rect x="120" y="130" width="140" height="50" fill="#f8fafc" stroke="#94a3b8" rx="4"/>
  <text x="190" y="150" text-anchor="middle" fill="#334155" font-size="12" font-weight="500">Determined</text>
  <text x="190" y="168" text-anchor="middle" fill="#64748b" font-size="10">low sensitivity</text>
  
  <rect x="520" y="420" width="140" height="50" fill="#f8fafc" stroke="#94a3b8" rx="4"/>
  <text x="590" y="440" text-anchor="middle" fill="#334155" font-size="12" font-weight="500">Determined</text>
  <text x="590" y="458" text-anchor="middle" fill="#64748b" font-size="10">stable routing</text>
  
  <!-- m_var influence arrows -->
  <path d="M 200 200 Q 280 240 320 280" fill="none" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#bluearrow)"/>
  <path d="M 580 380 Q 500 340 440 300" fill="none" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#bluearrow)"/>
  <text x="400" y="240" text-anchor="middle" fill="#0284c7" font-size="11" font-style="italic">m_var influence ↑ as |gap| ↓</text>
  
  <!-- Q5 inset -->
  <rect x="580" y="520" width="190" height="60" fill="#fef2f2" stroke="#fca5a5" rx="4"/>
  <text x="675" y="538" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="600">Q5 Low-Curvature</text>
  <text x="675" y="556" text-anchor="middle" fill="#b91c1c" font-size="10">flip_rate 14% • Δρ flat</text>
  <text x="675" y="572" text-anchor="middle" fill="#7f1d1d" font-size="10">outcome ≈ 52% (chance)</text>
  
  <!-- Legend -->
  <text x="80" y="560" fill="#475569" font-size="11">Selective Sensitivity: responsive where changes matter, suppressed where they don't</text>
  
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#334155"/>
    </marker>
    <marker id="bluearrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0ea5e9"/>
    </marker>
  </defs>
</svg>